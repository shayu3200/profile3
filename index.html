<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>くまさん月への上昇</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(to top, #001d3d, #003566);
    font-family: sans-serif;
    color: white;
    text-align: center;
  }
  canvas {
    display: block;
    margin: 0 auto;
    background: radial-gradient(circle at center, #001d3d, #000814);
  }
  #info {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
  }
</style>
</head>
<body>
<div id="info">← → で移動 / スペースで上昇！🌕</div>
<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gravity = 0.4;
let bear = {
  x: 180,
  y: 500,
  width: 40,
  height: 40,
  dy: 0,
  dx: 0
};

let obstacles = [];
let frame = 0;
let score = 0;
let gameOver = false;

let keys = {};

function drawBear() {
  ctx.fillStyle = "#8B4513";
  ctx.fillRect(bear.x, bear.y, bear.width, bear.height);

  ctx.fillStyle = "#000";
  ctx.fillRect(bear.x + 10, bear.y + 10, 5, 5);
  ctx.fillRect(bear.x + 25, bear.y + 10, 5, 5);
}

function drawMoon() {
  ctx.beginPath();
  ctx.arc(200, 80, 40, 0, Math.PI * 2);
  ctx.fillStyle = "#f1f1f1";
  ctx.fill();
}

function updateBear() {
  // 左右移動
  if (keys["ArrowLeft"]) bear.x -= 5;
  if (keys["ArrowRight"]) bear.x += 5;

  // 画面端制限
  if (bear.x < 0) bear.x = 0;
  if (bear.x + bear.width > canvas.width) bear.x = canvas.width - bear.width;

  // 上下（ジャンプ）
  bear.dy += gravity;
  bear.y += bear.dy;

  if (bear.y > canvas.height) gameOver = true;
  if (bear.y < 0) bear.y = 0;
}

function spawnObstacle() {
  const fromLeft = Math.random() < 0.5;

  obstacles.push({
    x: fromLeft ? -30 : canvas.width,
    y: Math.random() * (canvas.height - 100),
    width: 30,
    height: 30,
    dx: fromLeft ? 4 : -4
  });
}

function updateObstacles() {
  for (let o of obstacles) {
    o.x += o.dx;

    if (
      bear.x < o.x + o.width &&
      bear.x + bear.width > o.x &&
      bear.y < o.y + o.height &&
      bear.y + bear.height > o.y
    ) {
      gameOver = true;
    }
  }

  obstacles = obstacles.filter(o => o.x > -50 && o.x < canvas.width + 50);
}

function drawObstacles() {
  ctx.fillStyle = "#ff595e";
  obstacles.forEach(o => {
    ctx.fillRect(o.x, o.y, o.width, o.height);
  });
}

function drawScore() {
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("高さ: " + score, 10, 30);
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawMoon();

  if (!gameOver) {
    updateBear();
    updateObstacles();

    if (frame % 60 === 0) spawnObstacle();

    score++;
  } else {
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.fillText("GAME OVER", 80, 300);
  }

  drawBear();
  drawObstacles();
  drawScore();

  frame++;
  requestAnimationFrame(gameLoop);
}

// キー操作
window.addEventListener("keydown", (e) => {
  keys[e.code] = true;

  if (e.code === "Space" && !gameOver) {
    bear.dy = -8;
  }

  if (e.code === "Space" && gameOver) {
    location.reload();
  }
});

window.addEventListener("keyup", (e) => {
  keys[e.code] = false;
});

// スタート
gameLoop();
</script>
</body>
</html>
