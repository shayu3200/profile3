<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>くまさん月への上昇</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(to top, #001d3d, #003566);
    font-family: sans-serif;
    color: white;
    text-align: center;
  }
  canvas {
    display: block;
    margin: 0 auto;
    background: radial-gradient(circle at center, #001d3d, #000814);
  }
  #info {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
  }
</style>
</head>
<body>
<div id="info">スペースキーで上昇！月へ向かおう🌕</div>
<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gravity = 0.4;
let bear = {
  x: 180,
  y: 500,
  width: 40,
  height: 40,
  dy: 0
};

let obstacles = [];
let frame = 0;
let score = 0;
let gameOver = false;

function drawBear() {
  ctx.fillStyle = "#8B4513";
  ctx.fillRect(bear.x, bear.y, bear.width, bear.height);

  ctx.fillStyle = "#000";
  ctx.fillRect(bear.x + 10, bear.y + 10, 5, 5);
  ctx.fillRect(bear.x + 25, bear.y + 10, 5, 5);
}

function drawMoon() {
  ctx.beginPath();
  ctx.arc(200, 80, 40, 0, Math.PI * 2);
  ctx.fillStyle = "#f1f1f1";
  ctx.fill();
}

function updateBear() {
  bear.dy += gravity;
  bear.y += bear.dy;

  // 画面外でゲームオーバー
  if (bear.y > canvas.height) gameOver = true;
  if (bear.y < 0) bear.y = 0;
}

function spawnObstacle() {
  obstacles.push({
    x: Math.random() * (canvas.width - 30),
    y: -40,
    width: 30,
    height: 30
  });
}

function updateObstacles() {
  for (let o of obstacles) {
    o.y += 4; // 下に流れる

    if (
      bear.x < o.x + o.width &&
      bear.x + bear.width > o.x &&
      bear.y < o.y + o.height &&
      bear.y + bear.height > o.y
    ) {
      gameOver = true;
    }
  }

  obstacles = obstacles.filter(o => o.y < canvas.height + 50);
}

function drawObstacles() {
  ctx.fillStyle = "#ff595e";
  obstacles.forEach(o => {
    ctx.fillRect(o.x, o.y, o.width, o.height);
  });
}

function drawScore() {
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("高さ: " + score, 10, 30);
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawMoon();

  if (!gameOver) {
    updateBear();
    updateObstacles();

    if (frame % 60 === 0) spawnObstacle();

    score++;
  } else {
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.fillText("GAME OVER", 80, 300);
  }

  drawBear();
  drawObstacles();
  drawScore();

  frame++;
  requestAnimationFrame(gameLoop);
}

window.addEventListener("keydown", (e) => {
  if (e.code === "Space" && !gameOver) {
    bear.dy = -8; // 上に飛ぶ
  }

  if (e.code === "Space" && gameOver) {
    location.reload();
  }
});

gameLoop();
</script>
</body>
</html>
